version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: url-shortener-app
    ports:
      - "5001:5000"
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=postgresql://admin:password@db:5432/urlshortener
      - REDIS_URL=redis://cache:6379/0
      - BASE_URL=http://127.0.0.1:5001
      - SECRET_KEY=dev-secret-key
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - shortener-network
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: url-shortener-db
    environment:
      - POSTGRES_DB=urlshortener
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shortener-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d urlshortener"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  cache:
    image: redis:7-alpine
    container_name: url-shortener-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - shortener-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  shortener-network:
    driver: bridge
